name: jtool
description: JTool USB适配器硬件测试框架 - 用于I2C/SPI/GPIO设备的自动化测试

commands:
  interactive:
    description: 启动交互式测试向导（默认）
    entry: python jtool_skill.py interactive
    workdir: ${REPO_ROOT}

  scan:
    description: 扫描所有连接的JTool设备
    entry: python jtool_skill.py scan
    workdir: ${REPO_ROOT}

  quick:
    description: 快速I2C测试模式
    entry: python jtool_skill.py quick
    workdir: ${REPO_ROOT}

  test-eeprom:
    description: 测试AT24C02 EEPROM
    entry: python jtool_skill.py test-eeprom
    workdir: ${REPO_ROOT}

  test-flash:
    description: 测试W25Q SPI Flash
    entry: python jtool_skill.py test-flash
    workdir: ${REPO_ROOT}

help: |
  ╔══════════════════════════════════════════════════════════════╗
  ║              JTool USB适配器硬件测试工具                       ║
  ╚══════════════════════════════════════════════════════════════╝

  🔌 支持的接口: I2C | SPI | GPIO | CAN

  📋 使用方法:
    /jtool                    启动交互式测试向导
    /jtool scan               扫描连接的设备
    /jtool quick              快速I2C测试
    /jtool test-eeprom        测试AT24C02 EEPROM
    /jtool test-flash         测试W25Q Flash

  ✨ 功能特点:
    • 自动扫描I2C/SPI/GPIO设备
    • 交互式芯片测试向导（6步流程）
    • 支持数据手册导入 (datasheet/目录)
    • 根据手册自动生成测试方案
    • 内置EEPROM/Flash/传感器测试模板

  📁 项目结构:
    jtool_skill.py                                    主入口脚本
    datasheet/                                        存放芯片数据手册 ⭐
    .claude/skills/jtool/scripts/src/jtool.py         DLL封装API
    .claude/skills/jtool/scripts/src/test_framework.py   测试框架
    .claude/skills/jtool/scripts/src/jtool_skills.py     交互式工具

  💡 提示:
    首次使用时，将芯片数据手册(PDF/TXT)放入项目根目录的 datasheet/ 文件夹，
    交互式向导会自动识别并辅助生成测试方案。

  📝 测试流程:
    1. 询问模块类型和芯片型号
    2. 检查/导入数据手册
    3. 选择通信接口 (I2C/SPI/GPIO)
    4. 选择测试功能
    5. 配置设备参数
    6. 生成并执行测试方案
